<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DPlayer Stream</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
<script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

<!-- HLS.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- FLV.js -->
<script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
}
#dplayer {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>
<div id="dplayer"></div>

<script>
const params = new URLSearchParams(window.location.search)
const stream = params.get("url")

if (!stream) {
  document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:20%'>Missing ?url=</h2>"
  throw new Error("Missing stream URL")
}

// Auto detect type
let type = "auto"

if (stream.includes(".m3u8")) {
  type = "hls"
} else if (stream.includes(".flv")) {
  type = "flv"
}

const dp = new DPlayer({
  container: document.getElementById('dplayer'),
  live: true,
  autoplay: true,
  video: {
    url: "/" + type + "?url=" + encodeURIComponent(stream),
    type: type
  }
})

// Auto reconnect
dp.on('error', () => {
  console.log("Stream error, reconnecting...")
  setTimeout(() => {
    dp.switchVideo({
      url: "/" + type + "?url=" + encodeURIComponent(stream),
      type: type
    })
  }, 3000)
})
</script>

</body>
</html>
