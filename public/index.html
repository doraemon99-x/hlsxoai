<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JWPlayer Stream</title>

<script src="https://ssl.p.jwpcdn.com/player/v/8.31.0/jwplayer.js"></script>
<script>
jwplayer.key = "ITWMv7t88JGzI0xPwW8I0+LveiXX9SWbfdmt0ArUSyc=";
</script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
}
#player {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div id="player"></div>

<script>
const params = new URLSearchParams(window.location.search)
const stream = params.get("url")

if (!stream) {
  document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:20%'>Missing ?url=</h2>"
  throw new Error("Missing stream URL")
}

// Auto detect
let sourceUrl = stream

if (stream.includes(".m3u8")) {
  sourceUrl = "/hls?url=" + encodeURIComponent(stream)
} else if (stream.includes(".flv")) {
  sourceUrl = "/flv?url=" + encodeURIComponent(stream)
}

jwplayer("player").setup({
  file: sourceUrl,
  type: stream.includes(".m3u8") ? "hls" : "mp4",
  autostart: true,
  width: "100%",
  height: "100%",
  primary: "html5"
})

// Auto reconnect kalau live drop
jwplayer().on('error', function() {
  console.log("Stream error, reconnecting...")
  setTimeout(function() {
    jwplayer().load([{ file: sourceUrl }])
    jwplayer().play()
  }, 3000)
})
</script>

</body>
</html>
